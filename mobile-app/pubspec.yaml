name: xphc_mobile
description: >
  Ung dung di dong XPHC - Lap bien ban vi pham hanh chinh / trat tu xay dung /
  dat dai cap xa. Ho tro offline-first, dong bo du lieu, ban do chon vi tri,
  chup anh/video hien truong.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Giao dien / font chu (dong bo voi Web Admin - font Inter)
  google_fonts: ^6.2.1

  # State management
  provider: ^6.1.2

  # Network
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # Local storage
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Maps & location (mien phi - khong can API key/billing)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0

  # Media
  image_picker: ^1.1.2

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
