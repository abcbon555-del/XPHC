version: "3.9"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: xphc_db
      POSTGRES_USER: xphc_app_role
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - xphc_pgdata:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://xphc_app_role:change_me@db:5432/xphc_db
      SECRET_KEY: change_this_to_a_random_secret_string
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage

volumes:
  xphc_pgdata:
